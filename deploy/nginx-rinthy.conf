server {
    server_name rinthy.sawiq.org;

    root /var/www/rinthy;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|svg|png|jpg|jpeg|webp|ico|br|gz)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://vercel.live; style-src 'self' https://fonts.googleapis.com; img-src 'self' https://raw.githubusercontent.com data:; connect-src 'self' https://vitals.vercel-insights.com https://*.vercel-insights.com; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/rinthy.sawiq.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rinthy.sawiq.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = rinthy.sawiq.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name rinthy.sawiq.org;
    return 404; # managed by Certbot
}
